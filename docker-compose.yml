services:
  app:
    build: .
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      - db
      - redis
    volumes:
      - .:/usr/src/app
    command: npm start

  db:
    image: postgres:14
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: qwerty78
      POSTGRES_DB: auth_dev
    ports:
      - '5433:5432'
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  db_data:
  redis_data: